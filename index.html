<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تحليل الشخصية - DISC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="Css/all.css" />
    <link rel="stylesheet" href="Css/spr1.css" />
</head>
<body>

<div class="container" id="appContainer">

    <!-- الهيدر -->
    <div class="header">
        <span class="icon-big"><i class="fas fa-brain"></i></span>
        <h1>دراسة النمط الشخصى</h1>
        <div class="sub">
            <i class="fas fa-circle-check"></i> 
            <span class="highlight">24 سؤالاً</span> · اختر الصفة الأقرب لك
        </div>
    </div>

    <!-- الأسئلة -->
    <div class="questions-wrapper" id="questionsWrapper">
        <div id="questionsContainer"></div>

        <div class="progress-bar-wrapper">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>
            <div class="progress-text">
                <span>تم الإجابة</span>
                <span id="answeredCount">0</span>
            </div>
        </div>

        <button class="btn-result" id="resultBtn">
            <i class="fas fa-chart-simple"></i> اعرف شخصيتك الآن
        </button>
    </div>

    <!-- النتيجة -->
    <div class="result-area" id="resultArea">
        <div class="result-header">
            <h3><i class="fas fa-crown"></i> شخصيتك</h3>
            <div class="score-badges" id="scoreBadges"></div>
        </div>
        <div class="personality-cards" id="personalityCards"></div>
        <button class="reset-btn" id="resetBtn"><i class="fas fa-rotate-right"></i> إعادة الاختبار</button>
    </div>

</div>

<!-- ===== نافذة التفاصيل المنبثقة (Modal) ===== -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-content" id="modalContent">
        <button class="modal-close" id="modalClose"><i class="fas fa-xmark"></i></button>
        <div class="modal-title" id="modalTitle">
            <i class="fas fa-flag"></i>
            <span>الشخص القيادي</span>
        </div>
        <div class="modal-section strengths" id="modalStrengths">
            <h3><i class="fas fa-check-circle"></i> نقاط القوة</h3>
            <ul id="strengthsList"></ul>
        </div>
        <div class="modal-section weaknesses" id="modalWeaknesses">
            <h3><i class="fas fa-exclamation-circle"></i> نقاط الضعف</h3>
            <ul id="weaknessesList"></ul>
        </div>
        <div class="modal-decision" id="modalDecision">
            <p><i class="fas fa-bullseye"></i> <span id="decisionText">اتخاذ القرار .. استعد ..صوب ..اطلق</span></p>
        </div>
    </div>
</div>

<script src="Js/jpr1.js"></script>
</body>
</html>
